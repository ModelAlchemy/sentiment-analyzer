name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (no GPU needed)
        run: pytest tests/ -v --tb=short -k "not TestAPI"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check backend/ streamlit_app/ training/ tests/ --ignore E501,E402

      - name: Check Streamlit app syntax
        run: python -c "import ast; ast.parse(open('streamlit_app/app.py').read()); print('✅ OK')"

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sentiment-analyzer:latest .

      - name: Test Docker container starts
        run: |
          docker run -d --name test-api -p 8000:8000 sentiment-analyzer:latest
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api
